name: Release

on:
  push:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: treesize-macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: treesize-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: treesize-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --target ${{ matrix.target }}
      - run: mv target/${{ matrix.target }}/release/treesize ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            treesize-macos-aarch64/treesize-macos-aarch64 \
            treesize-macos-x86_64/treesize-macos-x86_64 \
            treesize-linux-x86_64/treesize-linux-x86_64
